<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Start - A Cerveja pra começar a noite</title>
    <link href="styles/admin-style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
</head>
<body class="loginb">
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h2>Start Admin</h2>
            <p>Área de Monitoramento do Processo de Produção</p>
        </div>
        <form action="/login" method="POST">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input id="email" name="username" required type="email">
            </div>
            <div class="input-group">
                <label for="password">Senha</label>
                <input id="password" name="password" required type="password">
            </div>
            <p id="login-erro"
               style="display:none; color:#FF6B6B; font-size:0.88rem; margin-bottom:0.5rem; text-align:left;">
                E-mail ou senha incorretos. Tente novamente.
            </p>
            <button class="login-btn" type="submit">Entrar</button>
        </form>
    </div>
</div>
<script>
    if (new URLSearchParams(window.location.search).has('error')) {
        document.getElementById('login-erro').style.display = 'block';
    }
</script>
</body>
</html>
